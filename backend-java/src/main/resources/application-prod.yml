spring:
  datasource:
    url: jdbc:mysql://mysql:3306/knowledge_base_assistant?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis
      port: 6379

ai:
  fastapi:
    base-url: http://fastapi-service:8000
  service:
    document:
      process-url: ${ai.fastapi.base-url}/internal/document/process
      timeout: 120000
    chat:
      ask-url: ${ai.fastapi.base-url}/internal/chat/ask
      timeout: 60000

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

file:
  upload-dir: /app/data/files
