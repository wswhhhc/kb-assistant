version: "3.8"

services:
  mysql:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  fastapi-service:
    ports:
      - "8000:8000"
    volumes:
      - ../backend-python:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  springboot-service:
    ports:
      - "8080:8080"
